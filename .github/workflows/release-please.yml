name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@a02a34c4d625b9a2de805e3b7e4e0d5b36b6eb73 # v4.1.3
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
